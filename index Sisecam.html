<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ВЕЛЕС — Мониторинг рейсов</title>
  <style>
    :root {
      --blue: #2563eb;
      --blue-bg: #eff6ff;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --yellow: #d97706;
      --yellow-bg: #fffbeb;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --purple-bg: #faf5ff;
      --purple: #7e22ce;
      --text: #111827;
      --text2: #6b7280;
      --border: #e5e7eb;
      --bg: #f3f4f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .brand-logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-logo svg { width: 22px; height: 22px; fill: #fff; }
    .brand-name { font-size: 15px; font-weight: 800; color: var(--blue); line-height: 1.2; }
    .brand-sub { font-size: 11px; color: var(--text2); }
    .header-center { text-align: center; flex: 1; }
    .header-center h1 { font-size: 17px; font-weight: 700; }
    .header-center p { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .header-right { font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; }
    .header-right span { font-weight: 700; color: var(--text); }

    /* PAGE */
    .page { max-width: 1400px; margin: 0 auto; padding: 16px 24px 32px; }

    /* ERROR BANNER */
    .err-banner {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 12px 14px;
      color: #991b1b; font-size: 13px; margin-bottom: 14px;
      white-space: pre-wrap;
    }

    /* ALERTS */
    .alert-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .alert {
      display: flex; align-items: flex-start; gap: 10px;
      border-radius: 8px; padding: 12px 14px; border: 1px solid;
    }
    .alert.red  { background: #fff5f5; border-color: #fecaca; }
    .alert.yellow { background: #fffbeb; border-color: #fde68a; }
    .alert-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-title { font-weight: 700; font-size: 13px; }
    .alert.red    .alert-title { color: #b91c1c; }
    .alert.yellow .alert-title { color: #92400e; }
    .alert-desc { font-size: 12px; margin-top: 2px; }
    .alert.red    .alert-desc { color: #ef4444; }
    .alert.yellow .alert-desc { color: #b45309; }
    .alert-close {
      background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 18px; line-height: 1;
      padding: 0; flex-shrink: 0; margin-left: 8px;
    }
    .alert-close:hover { color: var(--text); }

    /* FILTER BAR */
    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--text2);
      transition: background .1s, color .1s, border-color .1s;
    }
    .tab:hover { background: var(--blue-bg); color: var(--blue); border-color: #bfdbfe; }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 600; }
    .total-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
    .total-label span { font-weight: 700; color: var(--text); }

    /* PANEL */
    .panel { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 10px;
    }
    .panel-title { font-size: 15px; font-weight: 700; }
    .legend { display: flex; gap: 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot.plan    { background: #9ca3af; }
    .dot.fact-ok { background: var(--green); }
    .dot.fact-bad{ background: var(--red); }

    /* COL HEADERS */
    .col-headers {
      display: grid;
      grid-template-columns: 36px minmax(200px,1.8fr) 160px 200px 110px 170px;
      padding: 8px 18px;
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: .4px;
      gap: 6px;
    }

    /* TRAIN ROW */
    .train-row { border-bottom: 1px solid var(--border); }
    .train-row:last-child { border-bottom: none; }
    .row-main {
      display: grid;
      grid-template-columns: 36px minmax(200px,1.8fr) 160px 200px 110px 170px;
      align-items: center;
      padding: 12px 18px;
      cursor: pointer;
      gap: 6px;
      transition: background .1s;
    }
    .row-main:hover { background: #f9fafb; }

    /* EXPAND BUTTON */
    .expand-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer;
      color: var(--text2); font-size: 12px;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, border-color .1s;
      flex-shrink: 0;
    }
    .expand-btn:hover { border-color: var(--blue); color: var(--blue); }
    .expand-btn.open { transform: rotate(90deg); }

    /* ROUTE INFO */
    .route-name { font-weight: 700; font-size: 14px; }
    .route-num  { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .wagons-list { margin-top: 5px; display: flex; flex-direction: column; gap: 2px; }
    .wagon-id { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
    .wagon-icon { font-size: 10px; }

    /* DATE CELL */
    .date-cell { font-size: 12px; }
    .date-plan { color: var(--text2); }
    .date-fact { font-weight: 600; margin-top: 2px; }
    .date-fact.ok   { color: var(--green); }
    .date-fact.late { color: var(--red); }
    .date-dash { color: var(--text2); }

    /* PROGRESS CELL */
    .progress-text { font-size: 12px; font-weight: 600; }
    .progress-sub  { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .progress-bar  { height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin: 4px 0 2px; }
    .progress-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .3s; }

    /* STATUS BADGES */
    .badge {
      display: inline-block;
      padding: 4px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge.transit   { background: var(--blue-bg);   color: #1d4ed8; }
    .badge.unloading { background: var(--yellow-bg); color: #92400e; }
    .badge.done      { background: var(--green-bg);  color: #15803d; }
    .badge.planned   { background: #f9fafb; color: #6b7280; border: 1px solid var(--border); }
    .badge.loading   { background: var(--purple-bg); color: var(--purple); }

    /* ACTION BUTTONS */
    .actions-cell { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .action-btn {
      cursor: pointer; border: 1px solid var(--border);
      background: #fff; color: var(--text);
      border-radius: 7px; padding: 5px 10px;
      font-size: 12px; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
      transition: background .1s;
      white-space: nowrap;
    }
    .action-btn:hover { background: #f3f4f6; }

    /* EXPANDED ROW */
    .row-expanded {
      background: #f9fafb;
      border-top: 1px solid var(--border);
      padding: 12px 18px 14px 54px;
    }
    .location-line {
      display: flex; align-items: center; gap: 6px;
      color: var(--blue); font-size: 12px; font-weight: 600;
      margin-bottom: 10px;
    }
    .location-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; }
    .expanded-grid { display: flex; gap: 24px; flex-wrap: wrap; }
    .expanded-kv { }
    .expanded-k { font-size: 11px; color: var(--text2); }
    .expanded-v { font-size: 13px; font-weight: 600; margin-top: 2px; }

    /* EMPTY */
    .empty-state { padding: 48px 24px; text-align: center; color: var(--text2); font-size: 14px; }

    /* RESPONSIVE */
    @media (max-width: 960px) {
      .col-headers { display: none; }
      .row-main {
        grid-template-columns: 36px 1fr;
        grid-template-rows: auto;
      }
      .row-main > *:not(:nth-child(1)):not(:nth-child(2)) { grid-column: 2; }
    }
    @media (max-width: 600px) {
      .header-center { display: none; }
      .page { padding: 12px 14px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M4 16v2h2a2 2 0 004 0h4a2 2 0 004 0h2v-2H4zM17 6H7L4.5 12H19.5L17 6zM3 13v3h18v-3H3z"/></svg>
      </div>
      <div>
        <div class="brand-name">ВЕЛЕС</div>
        <div class="brand-sub">Транспортная компания</div>
      </div>
    </div>
    <div class="header-center">
      <h1>Мониторинг рейсов</h1>
      <p>ООО «РСХ»</p>
    </div>
    <div class="header-right">
      Последнее обновление: <span id="lastUpdate">—</span>
    </div>
  </div>
</header>

<div class="page">
  <div id="errBanner" class="err-banner" style="display:none"></div>
  <div id="alertList" class="alert-list"></div>

  <div class="filter-bar">
    <div class="filter-tabs" id="filterTabs">
      <button class="tab active" data-filter="all">Все рейсы</button>
      <button class="tab" data-filter="transit">В пути</button>
      <button class="tab" data-filter="unloading">Под выгрузкой</button>
      <button class="tab" data-filter="done">Завершённые</button>
      <button class="tab" data-filter="planned">В плане</button>
    </div>
    <div class="total-label">Всего рейсов: <span id="totalCount">—</span></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">График движения</div>
      <div class="legend">
        <div class="legend-item"><span class="dot plan"></span> План</div>
        <div class="legend-item"><span class="dot fact-ok"></span> Факт (в графике)</div>
        <div class="legend-item"><span class="dot fact-bad"></span> Факт (задержка)</div>
      </div>
    </div>
    <div class="col-headers">
      <div></div>
      <div>Маршрут и Состав</div>
      <div>Отправка груженого</div>
      <div>Прибытие на выгрузку</div>
      <div>Статус</div>
      <div>Действия</div>
    </div>
    <div id="tableBody"></div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXBERFavHCGXPd3ftSaIFRzWkLOO9k3yH0E1QKfL8LseyXoaXG3Ll11U8XTVU78BpJcv2DUM8-siSF/pub?output=csv&gid=1293717555";
  const REFRESH_EVERY_SEC = 60;

  let allRows = [];
  let currentFilter = "all";

  const tableBody  = document.getElementById("tableBody");
  const alertList  = document.getElementById("alertList");
  const errBanner  = document.getElementById("errBanner");
  const lastUpdate = document.getElementById("lastUpdate");
  const totalCount = document.getElementById("totalCount");
  const panelTitle = document.getElementById("panelTitle");

  document.getElementById("filterTabs").addEventListener("click", e => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderTable();
  });

  function esc(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
  }

  function csvParse(text) {
    const rows = [];
    let row = [], cur = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], nx = text[i + 1];
      if (inQ) {
        if (ch === '"' && nx === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQ = false; }
        else { cur += ch; }
      } else {
        if (ch === '"') { inQ = true; }
        else if (ch === ',') { row.push(cur); cur = ""; }
        else if (ch === '\n') { row.push(cur); cur = ""; rows.push(row.map(x => x.replace(/\r/g, ""))); row = []; }
        else { cur += ch; }
      }
    }
    if (cur.length || row.length) { row.push(cur); rows.push(row.map(x => x.replace(/\r/g, ""))); }
    return rows.filter(r => r.some(c => String(c).trim() !== ""));
  }

  function idxMap(headers) {
    const m = {};
    headers.forEach((h, i) => m[String(h || "").trim()] = i);
    return m;
  }

  function stateKey(state) {
    const s = String(state || "").toLowerCase();
    if (s.includes("пути"))           return "transit";
    if (s.includes("выгруз"))         return "unloading";
    if (s.includes("выполн") || s.includes("завершён") || s.includes("архив")) return "done";
    return "planned";
  }

  function stateLabel(state) {
    const map = {
      transit:   { label: "В пути",         cls: "transit"   },
      unloading: { label: "Под выгрузкой",  cls: "unloading" },
      done:      { label: "Выполнен",        cls: "done"      },
      planned:   { label: "В плане",         cls: "planned"   },
    };
    const s = String(state || "").trim();
    if (!s) return { label: "—", cls: "planned" };
    const sl = s.toLowerCase();
    if (sl.includes("погрузк") || sl.includes("загрузк")) return { label: "Погрузка", cls: "loading" };
    return map[stateKey(s)] || { label: s, cls: "planned" };
  }

  function parseDate(str) {
    const [dd, mm, yyyy] = String(str || "").split(".").map(Number);
    if (!dd || !mm || !yyyy) return null;
    return new Date(yyyy, mm - 1, dd);
  }

  function dateCellHtml(plan, fact, etaLabel) {
    if (!plan && !fact && !etaLabel) return '<div class="date-cell"><span class="date-dash">—</span></div>';
    let html = '<div class="date-cell">';
    if (plan) html += `<div class="date-plan">${esc(plan)}</div>`;
    if (fact) {
      const late = (() => { const p = parseDate(plan), f = parseDate(fact); return p && f && f > p; })();
      html += `<div class="date-fact ${late ? 'late' : 'ok'}">(${esc(fact)})</div>`;
    } else if (etaLabel) {
      html += `<div class="date-fact late">(ожидается: ${esc(etaLabel)})</div>`;
    }
    html += '</div>';
    return html;
  }

  function progressHtml(r) {
    const total = Number(r.wagons_total) || 0;
    const done  = Number(r.wagons_in_unloading) || 0;
    if (!total) return '<div class="date-cell"><span class="date-dash">—</span></div>';
    const pct    = Math.min(100, Math.round(done / total * 100));
    const remain = total - done;
    return `
      <div>
        <div class="progress-text">${done} из ${total} ваг.(${pct}%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-sub">Осталось: ${remain} ваг.</div>
      </div>`;
  }

  function renderAlerts(rows) {
    alertList.innerHTML = "";
    rows
      .filter(r => { const o = String(r.overall_status || "").toUpperCase(); return o === "BAD" || o === "ALERT" || o === "WARN" || o === "WARNING"; })
      .slice(0, 5)
      .forEach(r => {
        const isBad = ["BAD","ALERT"].includes(String(r.overall_status||"").toUpperCase());
        const cls   = isBad ? "red" : "yellow";
        const title = isBad
          ? `Внимание! Задержка рейса ${esc(r.train_id || r.train_name || "")}`
          : `Рейс ${esc(r.train_id || r.train_name || "")} подходит к станции выгрузки`;
        const desc  = esc(r.alert_text || r.current_state || "");
        const div   = document.createElement("div");
        div.className = `alert ${cls}`;
        div.innerHTML = `
          <div class="alert-icon">⚠</div>
          <div class="alert-body">
            <div class="alert-title">${title}</div>
            ${desc ? `<div class="alert-desc">${desc}</div>` : ""}
          </div>
          <button class="alert-close" title="Закрыть">×</button>`;
        div.querySelector(".alert-close").addEventListener("click", () => div.remove());
        alertList.appendChild(div);
      });
  }

  function renderTable() {
    const filtered = currentFilter === "all"
      ? allRows
      : allRows.filter(r => stateKey(r.current_state) === currentFilter);

    totalCount.textContent = allRows.length;
    tableBody.innerHTML = "";

    if (!filtered.length) {
      tableBody.innerHTML = '<div class="empty-state">Рейсы не найдены</div>';
      return;
    }

    for (const r of filtered) {
      const st      = stateLabel(r.current_state);
      const isUnl   = stateKey(r.current_state) === "unloading";
      const isDone  = stateKey(r.current_state) === "done";
      const wagIds  = String(r.wagon_ids || "").split(/[,;]+/).map(s => s.trim()).filter(Boolean);

      const arrivalCol = isUnl
        ? progressHtml(r)
        : dateCellHtml(r.arrival_plan, r.arrival_fact, r.arrival_eta);

      const wagonListHtml = wagIds.length
        ? `<div class="wagons-list">
            ${wagIds.slice(0, 4).map(w => `<span class="wagon-id"><span class="wagon-icon">☐</span>${esc(w)}</span>`).join("")}
            ${wagIds.length > 4 ? `<span style="color:var(--text2);font-size:11px">+${wagIds.length - 4} ещё</span>` : ""}
          </div>` : "";

      const row = document.createElement("div");
      row.className = "train-row";
      row.innerHTML = `
        <div class="row-main">
          <button class="expand-btn" title="Подробнее">›</button>
          <div>
            <div class="route-name">${esc(r.route_name || "—")}</div>
            <div class="route-num">${esc(r.train_id || "")}${r.wagons_total ? " / " + esc(r.wagons_total) + " ваг." : ""}</div>
            ${wagonListHtml}
          </div>
          ${dateCellHtml(r.departure_plan, r.departure_fact, "")}
          ${arrivalCol}
          <div><span class="badge ${st.cls}">${esc(st.label)}</span></div>
          <div class="actions-cell">
            <button class="action-btn">📄 Отчет</button>
            <button class="action-btn">📅 Перенос</button>
            ${isDone ? '<button class="action-btn">🗂 Архив</button>' : ""}
          </div>
        </div>
        <div class="row-expanded" style="display:none">
          ${r.current_station ? `<div class="location-line"><span class="location-dot"></span>Сейчас: ${esc(r.current_station)}</div>` : ""}
          <div class="expanded-grid">
            ${r.dislocation_updated_at ? `<div class="expanded-kv"><div class="expanded-k">Обновлено</div><div class="expanded-v">${esc(r.dislocation_updated_at)}</div></div>` : ""}
            ${r.wagons_in_transit   ? `<div class="expanded-kv"><div class="expanded-k">В пути вагонов</div><div class="expanded-v">${esc(r.wagons_in_transit)}</div></div>` : ""}
            ${r.wagons_in_loading   ? `<div class="expanded-kv"><div class="expanded-k">На погрузке</div><div class="expanded-v">${esc(r.wagons_in_loading)}</div></div>` : ""}
            ${r.norm_unload_days    ? `<div class="expanded-kv"><div class="expanded-k">Норма выгр., сут.</div><div class="expanded-v">${esc(r.norm_unload_days)}</div></div>` : ""}
            ${r.fact_unload_days    ? `<div class="expanded-kv"><div class="expanded-k">Факт выгр., сут.</div><div class="expanded-v">${esc(r.fact_unload_days)}</div></div>` : ""}
          </div>
        </div>`;

      const mainRow    = row.querySelector(".row-main");
      const expandedEl = row.querySelector(".row-expanded");
      const expandBtn  = row.querySelector(".expand-btn");

      mainRow.addEventListener("click", e => {
        if (e.target.closest(".action-btn")) return;
        const open = expandedEl.style.display === "none";
        expandedEl.style.display = open ? "block" : "none";
        expandBtn.classList.toggle("open", open);
      });

      tableBody.appendChild(row);
    }
  }

  function setError(msg) {
    if (!msg) { errBanner.style.display = "none"; errBanner.textContent = ""; return; }
    errBanner.style.display = "block";
    errBanner.textContent = msg;
  }

  async function load() {
    try {
      const bust = (CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      const res  = await fetch(CSV_URL + bust, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status + " " + res.statusText);
      const text  = await res.text();
      const table = csvParse(text);

      if (table.length < 2) {
        setError(table.length === 1
          ? "Заголовки найдены, строк данных нет. Колонки: " + table[0].join(", ")
          : "CSV пустой. Возможно, загружается неверный лист.");
        return;
      }

      setError("");
      const headers = table[0].map(h => String(h || "").trim());
      const m = idxMap(headers);
      const g = key => m[key] !== undefined ? arr => arr[m[key]] || "" : () => "";

      allRows = table.slice(1).map(arr => ({
        train_id:              g("train_id")(arr),
        train_name:            g("train_name")(arr),
        route_name:            g("route_name")(arr),
        current_state:         g("current_state")(arr),
        current_station:       g("current_station")(arr),
        dislocation_updated_at:g("dislocation_updated_at")(arr),
        wagons_total:          g("wagons_total")(arr),
        wagons_in_loading:     g("wagons_in_loading")(arr),
        wagons_in_transit:     g("wagons_in_transit")(arr),
        wagons_in_unloading:   g("wagons_in_unloading")(arr),
        norm_unload_days:      g("norm_unload_days")(arr),
        fact_unload_days:      g("fact_unload_days")(arr),
        overall_status:        g("overall_status")(arr),
        departure_plan:        g("departure_plan")(arr),
        departure_fact:        g("departure_fact")(arr),
        arrival_plan:          g("arrival_plan")(arr),
        arrival_fact:          g("arrival_fact")(arr),
        arrival_eta:           g("arrival_eta")(arr),
        wagon_ids:             g("wagon_ids")(arr),
        alert_text:            g("alert_text")(arr),
      })).filter(r => r.train_id || r.train_name);

      allRows.sort((a, b) => String(a.train_id || "").localeCompare(String(b.train_id || ""), "ru"));

      const now = new Date();
      lastUpdate.textContent = now.toLocaleString("ru-RU", {
        day: "2-digit", month: "2-digit", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
      const months = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
      panelTitle.textContent = `График движения: ${months[now.getMonth()]} ${now.getFullYear()}`;

      renderAlerts(allRows);
      renderTable();
    } catch (e) {
      setError(String(e?.message || e));
    }
  }

  load();
  setInterval(load, REFRESH_EVERY_SEC * 1000);
</script>
</body>
</html>
