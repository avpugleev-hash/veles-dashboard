<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VELES — Train Monitor</title>
  <style>
    :root{
      --bg:#f0f4f8;
      --card:#ffffff;
      --card2:#f8fafc;
      --text:#1a2332;
      --muted:#64748b;
      --line:rgba(0,0,0,.10);
      --ok:#16a34a;
      --warn:#d97706;
      --bad:#dc2626;
      --info:#2563eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      color:var(--text);
      background: radial-gradient(1200px 600px at 20% 0%, rgba(77,163,255,.10), transparent 60%),
                  radial-gradient(900px 500px at 80% 10%, rgba(37,194,106,.08), transparent 55%),
                  radial-gradient(800px 500px at 50% 100%, rgba(255,176,32,.07), transparent 55%),
                  var(--bg);
      min-height:100vh;
    }
    header{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,.85);
      border-bottom:1px solid var(--line);
      z-index:10;
    }
    .wrap{max-width:1200px;margin:0 auto;padding:16px 18px}
    .top{
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      flex-wrap:wrap;
    }
    .brand{
      display:flex; gap:12px; align-items:center;
    }
    .logo{
      width:36px;height:36px;border-radius:12px;
      background: linear-gradient(135deg, rgba(77,163,255,.95), rgba(37,194,106,.9));
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    h1{font-size:18px;margin:0}
    .sub{color:var(--muted); font-size:12px}
    .controls{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    .pill{
      border:1px solid var(--line);
      background: rgba(0,0,0,.04);
      border-radius:999px;
      padding:8px 10px;
      display:flex; gap:8px; align-items:center;
      font-size:12px; color:var(--muted);
    }
    .btn{
      cursor:pointer;
      border:1px solid var(--line);
      background: rgba(0,0,0,.05);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-weight:600;
      font-size:12px;
      transition:.15s transform, .15s background;
    }
    .btn:hover{background: rgba(0,0,0,.09)}
    .btn:active{transform: translateY(1px)}
    main .wrap{padding-top:18px}
    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap:14px;
    }
    .card{
      grid-column: span 4;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      position:relative;
      overflow:hidden;
    }
    @media (max-width: 1020px){ .card{grid-column: span 6;} }
    @media (max-width: 640px){ .card{grid-column: span 12;} }
    .card:before{
      content:"";
      position:absolute; inset:-80px -80px auto auto;
      width:220px; height:220px;
      background: radial-gradient(circle at 30% 30%, rgba(77,163,255,.22), transparent 60%);
      transform: rotate(25deg);
      pointer-events:none;
    }
    .row{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
    .title{
      display:flex; flex-direction:column; gap:4px;
      min-width:0;
    }
    .train{font-size:16px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .route{font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .badge{
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.2px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.06);
      white-space:nowrap;
    }
    .badge.ok{color:var(--ok); border-color: rgba(37,194,106,.35); background: rgba(37,194,106,.08)}
    .badge.warn{color:var(--warn); border-color: rgba(255,176,32,.35); background: rgba(255,176,32,.08)}
    .badge.bad{color:var(--bad); border-color: rgba(255,77,79,.35); background: rgba(255,77,79,.08)}
    .badge.info{color:var(--info); border-color: rgba(77,163,255,.35); background: rgba(77,163,255,.08)}
    .meta{
      margin-top:12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .kv{
      background: rgba(0,0,0,.04);
      border:1px solid rgba(0,0,0,.07);
      border-radius:16px;
      padding:10px;
    }
    .k{font-size:11px; color:var(--muted)}
    .v{margin-top:4px; font-size:14px; font-weight:800}
    .small{font-size:12px; font-weight:700; color:var(--text)}
    .footer{
      margin-top:14px;
      display:flex; justify-content:space-between; gap:10px; align-items:center;
      color:var(--muted);
      font-size:11px;
      border-top:1px solid rgba(0,0,0,.07);
      padding-top:10px;
    }
    .err{
      border:1px solid rgba(220,38,38,.3);
      background: rgba(220,38,38,.06);
      color: #7f1d1d;
      border-radius:16px;
      padding:12px 14px;
      font-size:13px;
      margin-top:10px;
      white-space:pre-wrap;
    }
    .skeleton{
      opacity:.7;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:.95} }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>VELES — Train Monitor</h1>
          <div class="sub">Источник: Google Sheets → Published CSV (лист API_TRAINS)</div>
        </div>
      </div>
      <div class="controls">
        <div class="pill" id="statusPill">⏳ загрузка…</div>
        <button class="btn" id="refreshBtn">Обновить</button>
      </div>
    </div>
    <div id="errorBox" class="err" style="display:none"></div>
  </div>
</header>
<main>
  <div class="wrap">
    <div class="grid" id="grid"></div>
  </div>
</main>
<script>
  // Published CSV URL (лист API_TRAINS, Google Sheets → Файл → Поделиться → Опубликовать)
  // Если лист API_TRAINS не первый — добавьте &gid=ВАШИ_ЦИФРЫ к URL ниже
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXBERFavHCGXPd3ftSaIFRzWkLOO9k3yH0E1QKfL8LseyXoaXG3Ll11U8XTVU78BpJcv2DUM8-siSF/pub?output=csv";
  // автообновление (сек)
  const REFRESH_EVERY_SEC = 60;
  const grid = document.getElementById("grid");
  const pill = document.getElementById("statusPill");
  const errorBox = document.getElementById("errorBox");
  document.getElementById("refreshBtn").addEventListener("click", () => load(true));
  function setError(msg){
    if(!msg){
      errorBox.style.display="none";
      errorBox.textContent="";
      return;
    }
    errorBox.style.display="block";
    errorBox.textContent=msg;
  }
  function setPill(text){ pill.textContent = text; }
  function csvParse(text){
    // простой CSV парсер с поддержкой кавычек
    const rows = [];
    let row = [], cur = "", inQ = false;
    for(let i=0;i<text.length;i++){
      const ch = text[i];
      const next = text[i+1];
      if(inQ){
        if(ch === '"' && next === '"'){ cur += '"'; i++; }
        else if(ch === '"'){ inQ = false; }
        else { cur += ch; }
      } else {
        if(ch === '"'){ inQ = true; }
        else if(ch === ","){ row.push(cur); cur=""; }
        else if(ch === "\n"){
          row.push(cur); cur="";
          // убираем \r
          rows.push(row.map(x => x.replace(/\r/g,"")));
          row=[];
        } else { cur += ch; }
      }
    }
    if(cur.length || row.length){
      row.push(cur);
      rows.push(row.map(x => x.replace(/\r/g,"")));
    }
    return rows.filter(r => r.some(c => String(c).trim() !== ""));
  }
  function idxMap(headers){
    const m = {};
    headers.forEach((h,i)=> m[String(h||"").trim()] = i);
    return m;
  }
  function n(v){
    const x = Number(String(v||"").replace(",", "."));
    return Number.isFinite(x) ? x : 0;
  }
  function badgeClass(overall, state){
    const o = String(overall||"").toUpperCase().trim();
    if(o === "ALERT" || o === "BAD") return "bad";
    if(o === "WARN" || o === "WARNING") return "warn";
    if(o === "OK") return "ok";
    // если overall_status пустой — красим по состоянию
    const s = String(state||"").toLowerCase();
    if(s.includes("выгруз")) return "warn";
    if(s.includes("погруз")) return "info";
    if(s.includes("пути")) return "ok";
    return "info";
  }
  function renderSkeleton(){
    grid.innerHTML = "";
    for(let i=0;i<3;i++){
      const c = document.createElement("div");
      c.className="card skeleton";
      c.innerHTML = `
        <div class="row">
          <div class="title">
            <div class="train">Загрузка…</div>
            <div class="route">—</div>
          </div>
          <div class="badge info">…</div>
        </div>
        <div class="meta">
          <div class="kv"><div class="k">Станция</div><div class="v">—</div></div>
          <div class="kv"><div class="k">Обновлено</div><div class="v small">—</div></div>
          <div class="kv"><div class="k">Всего вагонов</div><div class="v">—</div></div>
          <div class="kv"><div class="k">Погр / В пути / Выгр</div><div class="v small">—</div></div>
        </div>
        <div class="footer"><div>—</div><div>—</div></div>
      `;
      grid.appendChild(c);
    }
  }
  function render(rows){
    grid.innerHTML = "";
    for(const r of rows){
      const state = r.current_state || "";
      const overall = r.overall_status || "";
      const badge = badgeClass(overall, state);
      const wagTotal = n(r.wagons_total);
      const wLoad = n(r.wagons_in_loading);
      const wTransit = n(r.wagons_in_transit);
      const wUnl = n(r.wagons_in_unloading);
      const card = document.createElement("div");
      card.className="card";
      card.innerHTML = `
        <div class="row">
          <div class="title">
            <div class="train">${escapeHtml(r.train_name || r.train_id || "—")}</div>
            <div class="route">${escapeHtml(r.route_name || "—")}</div>
          </div>
          <div class="badge ${badge}">${escapeHtml(state || overall || "—")}</div>
        </div>
        <div class="meta">
          <div class="kv">
            <div class="k">Текущая станция</div>
            <div class="v">${escapeHtml(r.current_station || "—")}</div>
          </div>
          <div class="kv">
            <div class="k">Обновлено</div>
            <div class="v small">${escapeHtml(r.dislocation_updated_at || "—")}</div>
          </div>
          <div class="kv">
            <div class="k">Всего вагонов</div>
            <div class="v">${wagTotal}</div>
          </div>
          <div class="kv">
            <div class="k">Погрузка / В пути / Выгрузка</div>
            <div class="v small">${wLoad} / ${wTransit} / ${wUnl}</div>
          </div>
          <div class="kv">
            <div class="k">Норма выгрузки (сут)</div>
            <div class="v">${r.norm_unload_days || "—"}</div>
          </div>
          <div class="kv">
            <div class="k">Факт выгрузки (сут)</div>
            <div class="v">${r.fact_unload_days || "—"}</div>
          </div>
        </div>
        <div class="footer">
          <div>ID: ${escapeHtml(r.train_id || "—")}</div>
          <div>Статус: ${escapeHtml(r.overall_status || "OK")}</div>
        </div>
      `;
      grid.appendChild(card);
    }
  }
  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
  async function load(manual=false){
    setError("");
    if(!manual) renderSkeleton();
    try{
      if(!CSV_URL || CSV_URL.includes("PASTE_YOUR")) {
        throw new Error("Не задан CSV_URL. Вставьте Published CSV ссылку из Google Sheets (лист API_TRAINS).");
      }
      setPill("🔄 обновление…");
      const bust = (CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      const res = await fetch(CSV_URL + bust, { cache: "no-store" });
      if(!res.ok) throw new Error("Fetch error: " + res.status + " " + res.statusText);
      const text = await res.text();
      const table = csvParse(text);
      if(table.length < 2) {
        const preview = table.length === 1
          ? "Заголовки найдены, но строк данных нет.\nКолонки: " + table[0].join(", ")
          : "CSV пустой (0 строк). Возможно, загружается не тот лист.\nДобавьте &gid=XXXXXXX к CSV_URL для листа API_TRAINS.";
        setPill("⚠️ пусто");
        setError(preview);
        render([]);
        return;
      }
      const headers = table[0].map(h => String(h||"").trim());
      const m = idxMap(headers);
      // обязательные поля
      const required = ["train_name","train_id","current_state","current_station","wagons_total"];
      const missing = required.filter(k => m[k] === undefined);
      if(missing.length){
        throw new Error(
          "В CSV не хватает колонок: " + missing.join(", ") + "\n" +
          "Проверьте строку 1 листа API_TRAINS (должны быть ровно ваши заголовки)."
        );
      }
      const rows = table.slice(1).map(arr => ({
        train_name: arr[m["train_name"]],
        train_id: arr[m["train_id"]],
        route_name: arr[m["route_name"]],
        current_state: arr[m["current_state"]],
        current_station: arr[m["current_station"]],
        dislocation_updated_at: arr[m["dislocation_updated_at"]],
        wagons_total: arr[m["wagons_total"]],
        wagons_in_loading: arr[m["wagons_in_loading"]],
        wagons_in_transit: arr[m["wagons_in_transit"]],
        wagons_in_unloading: arr[m["wagons_in_unloading"]],
        norm_unload_days: arr[m["norm_unload_days"]],
        fact_unload_days: arr[m["fact_unload_days"]],
        overall_status: arr[m["overall_status"]],
      }))
      .filter(r => String(r.train_id||"").trim() || String(r.train_name||"").trim());
      // сортировка по train_id
      rows.sort((a,b)=> String(a.train_id||"").localeCompare(String(b.train_id||""), "ru"));
      render(rows);
      setPill(`✅ обновлено: ${new Date().toLocaleString("ru-RU")}`);
    } catch(e){
      setPill("❌ ошибка");
      setError(String(e && e.message ? e.message : e));
      grid.innerHTML = "";
    }
  }
  load(false);
  setInterval(()=>load(false), REFRESH_EVERY_SEC * 1000);
</script>
</body>
</html>
