<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ВЕЛЕС — Мониторинг рейсов</title>
  <style>
    :root {
      --blue: #2563eb;
      --blue-bg: #eff6ff;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --yellow: #d97706;
      --yellow-bg: #fffbeb;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --purple-bg: #faf5ff;
      --purple: #7e22ce;
      --orange: #ea580c;
      --orange-bg: #fff7ed;
      --text: #111827;
      --text2: #6b7280;
      --border: #e5e7eb;
      --bg: #f3f4f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .brand-logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-logo svg { width: 22px; height: 22px; fill: #fff; }
    .brand-name { font-size: 15px; font-weight: 800; color: var(--blue); line-height: 1.2; }
    .brand-sub { font-size: 11px; color: var(--text2); }
    .header-center { text-align: center; flex: 1; }
    .header-center h1 { font-size: 17px; font-weight: 700; }
    .header-center p { font-size: 12px; color: var(--text2); margin-top: 1px; }
    .header-right { font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; }
    .header-right span { font-weight: 700; color: var(--text); }

    /* PAGE */
    .page { max-width: 1400px; margin: 0 auto; padding: 16px 24px 32px; }

    /* ERROR BANNER */
    .err-banner {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 12px 14px;
      color: #991b1b; font-size: 13px; margin-bottom: 14px;
      white-space: pre-wrap;
    }

    /* ALERTS */
    .alert-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .alert {
      display: flex; align-items: flex-start; gap: 10px;
      border-radius: 8px; padding: 12px 14px; border: 1px solid;
    }
    .alert.red    { background: #fff5f5; border-color: #fecaca; }
    .alert.yellow { background: #fffbeb; border-color: #fde68a; }
    .alert-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-title { font-weight: 700; font-size: 13px; }
    .alert.red    .alert-title { color: #b91c1c; }
    .alert.yellow .alert-title { color: #92400e; }
    .alert-desc { font-size: 12px; margin-top: 2px; }
    .alert.red    .alert-desc { color: #ef4444; }
    .alert.yellow .alert-desc { color: #b45309; }
    .alert-close {
      background: none; border: none; cursor: pointer;
      color: var(--text2); font-size: 18px; line-height: 1;
      padding: 0; flex-shrink: 0; margin-left: 8px;
    }
    .alert-close:hover { color: var(--text); }

    /* FILTER BAR */
    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--text2);
      transition: background .1s, color .1s, border-color .1s;
    }
    .tab:hover { background: var(--blue-bg); color: var(--blue); border-color: #bfdbfe; }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 600; }
    .total-label { font-size: 13px; color: var(--text2); white-space: nowrap; }
    .total-label span { font-weight: 700; color: var(--text); }

    /* PANEL */
    .panel { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 10px;
    }
    .panel-title { font-size: 15px; font-weight: 700; }
    .legend { display: flex; gap: 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot.plan    { background: #9ca3af; }
    .dot.fact-ok { background: var(--green); }
    .dot.fact-bad{ background: var(--red); }

    /* COL HEADERS */
    .col-headers {
      display: grid;
      grid-template-columns: 36px minmax(200px,1.8fr) 160px 200px 140px 170px;
      padding: 8px 18px;
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: .4px;
      gap: 6px;
    }

    /* TRAIN ROW */
    .train-row { border-bottom: 1px solid var(--border); }
    .train-row:last-child { border-bottom: none; }
    .row-main {
      display: grid;
      grid-template-columns: 36px minmax(200px,1.8fr) 160px 200px 140px 170px;
      align-items: center;
      padding: 12px 18px;
      cursor: pointer;
      gap: 6px;
      transition: background .1s;
    }
    .row-main:hover { background: #f9fafb; }

    /* EXPAND BUTTON */
    .expand-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer;
      color: var(--text2); font-size: 12px;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, border-color .1s;
      flex-shrink: 0;
    }
    .expand-btn:hover { border-color: var(--blue); color: var(--blue); }
    .expand-btn.open { transform: rotate(90deg); }

    /* ROUTE INFO */
    .route-name { font-weight: 700; font-size: 14px; }
    .route-num  { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* DATE CELL */
    .date-cell { font-size: 12px; }
    .date-plan { color: var(--text2); }
    .date-fact { font-weight: 600; margin-top: 2px; }
    .date-fact.ok   { color: var(--green); }
    .date-fact.late { color: var(--red); }
    .date-eta  { font-weight: 600; margin-top: 2px; color: var(--blue); }
    .date-dash { color: var(--text2); }

    /* PROGRESS BAR (выгрузка) */
    .progress-text { font-size: 12px; font-weight: 600; }
    .progress-sub  { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .progress-bar  { height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin: 4px 0 2px; }
    .progress-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .3s; }

    /* LOADING STATUS */
    .loading-cell { font-size: 12px; }
    .loading-status { font-weight: 700; margin-top: 3px; }
    .loading-status.delayed { color: var(--red); }
    .loading-status.ok      { color: var(--green); }
    .wagons-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

    /* TRANSIT CELL */
    .transit-cell { font-size: 12px; }
    .transit-station { font-weight: 600; }
    .transit-km { color: var(--text2); font-size: 11px; margin-top: 2px; }
    .transit-eta { color: var(--blue); font-size: 11px; margin-top: 1px; font-weight: 600; }

    /* STATUS BADGES */
    .badge {
      display: inline-block;
      padding: 4px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .badge.transit   { background: var(--blue-bg);   color: #1d4ed8; }
    .badge.unloading { background: var(--yellow-bg); color: #92400e; }
    .badge.done      { background: var(--green-bg);  color: #15803d; }
    .badge.planned   { background: #f9fafb; color: #6b7280; border: 1px solid var(--border); }
    .badge.loading   { background: var(--purple-bg); color: var(--purple); }
    .badge.delayed   { background: var(--red-bg);    color: var(--red); }

    /* ACTION BUTTONS */
    .actions-cell { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .action-btn {
      cursor: pointer; border: 1px solid var(--border);
      background: #fff; color: var(--text);
      border-radius: 7px; padding: 5px 10px;
      font-size: 12px; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
      transition: background .1s;
      white-space: nowrap;
    }
    .action-btn:hover { background: #f3f4f6; }

    /* EXPANDED ROW */
    .row-expanded {
      background: #f9fafb;
      border-top: 1px solid var(--border);
      padding: 12px 18px 14px 54px;
    }
    .location-line {
      display: flex; align-items: center; gap: 6px;
      color: var(--blue); font-size: 12px; font-weight: 600;
      margin-bottom: 10px;
    }
    .location-dot { width: 8px; height: 8px; background: var(--blue); border-radius: 50%; }
    .expanded-grid { display: flex; gap: 24px; flex-wrap: wrap; }
    .expanded-kv { }
    .expanded-k { font-size: 11px; color: var(--text2); }
    .expanded-v { font-size: 13px; font-weight: 600; margin-top: 2px; }
    .expanded-v.warn { color: var(--red); }
    .expanded-v.ok   { color: var(--green); }

    /* EMPTY */
    .empty-state { padding: 48px 24px; text-align: center; color: var(--text2); font-size: 14px; }

    /* RESPONSIVE */
    @media (max-width: 960px) {
      .col-headers { display: none; }
      .row-main {
        grid-template-columns: 36px 1fr;
        grid-template-rows: auto;
      }
      .row-main > *:not(:nth-child(1)):not(:nth-child(2)) { grid-column: 2; }
    }
    @media (max-width: 600px) {
      .header-center { display: none; }
      .page { padding: 12px 14px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M4 16v2h2a2 2 0 004 0h4a2 2 0 004 0h2v-2H4zM17 6H7L4.5 12H19.5L17 6zM3 13v3h18v-3H3z"/></svg>
      </div>
      <div>
        <div class="brand-name">ВЕЛЕС</div>
        <div class="brand-sub">Транспортная компания</div>
      </div>
    </div>
    <div class="header-center">
      <h1>Мониторинг рейсов</h1>
      <p>ООО «РСХ»</p>
    </div>
    <div class="header-right">
      Обновлено: <span id="lastUpdate">—</span>
    </div>
  </div>
</header>

<div class="page">
  <div id="errBanner" class="err-banner" style="display:none"></div>
  <div id="alertList" class="alert-list"></div>

  <div class="filter-bar">
    <div class="filter-tabs" id="filterTabs">
      <button class="tab active" data-filter="all">Все рейсы</button>
      <button class="tab" data-filter="loading">На погрузке</button>
      <button class="tab" data-filter="transit">В пути</button>
      <button class="tab" data-filter="unloading">Под выгрузкой</button>
      <button class="tab" data-filter="done">Завершённые</button>
      <button class="tab" data-filter="planned">В плане</button>
    </div>
    <div class="total-label">Всего рейсов: <span id="totalCount">—</span></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">График движения</div>
      <div class="legend">
        <div class="legend-item"><span class="dot plan"></span> План</div>
        <div class="legend-item"><span class="dot fact-ok"></span> Факт (в графике)</div>
        <div class="legend-item"><span class="dot fact-bad"></span> Факт (задержка)</div>
      </div>
    </div>
    <div class="col-headers">
      <div></div>
      <div>Маршрут и Состав</div>
      <div>Отправление</div>
      <div>Прибытие / Статус погрузки</div>
      <div>Состояние</div>
      <div>Действия</div>
    </div>
    <div id="tableBody"></div>
  </div>
</div>

<script>
  // ← Вставьте URL опубликованного CSV листа API_TRIPS
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXBERFavHCGXPd3ftSaIFRzWkLOO9k3yH0E1QKfL8LseyXoaXG3Ll11U8XTVU78BpJcv2DUM8-siSF/pub?output=csv&gid=1293717555";
  const REFRESH_EVERY_SEC = 60;

  let allRows = [];
  let currentFilter = "all";

  const tableBody  = document.getElementById("tableBody");
  const alertList  = document.getElementById("alertList");
  const errBanner  = document.getElementById("errBanner");
  const lastUpdate = document.getElementById("lastUpdate");
  const totalCount = document.getElementById("totalCount");
  const panelTitle = document.getElementById("panelTitle");

  document.getElementById("filterTabs").addEventListener("click", e => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderTable();
  });

  // ─── Утилиты ───────────────────────────────────────────────────────────────

  function esc(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
  }

  function csvParse(text) {
    const rows = [];
    let row = [], cur = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], nx = text[i + 1];
      if (inQ) {
        if (ch === '"' && nx === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQ = false; }
        else { cur += ch; }
      } else {
        if (ch === '"') { inQ = true; }
        else if (ch === ',') { row.push(cur); cur = ""; }
        else if (ch === '\n') { row.push(cur); cur = ""; rows.push(row.map(x => x.replace(/\r/g, ""))); row = []; }
        else { cur += ch; }
      }
    }
    if (cur.length || row.length) { row.push(cur); rows.push(row.map(x => x.replace(/\r/g, ""))); }
    return rows.filter(r => r.some(c => String(c).trim() !== ""));
  }

  function idxMap(headers) {
    const m = {};
    headers.forEach((h, i) => m[String(h || "").trim()] = i);
    return m;
  }

  // ─── Состояния ─────────────────────────────────────────────────────────────

  function stateKey(state) {
    const s = String(state || "").trim().toLowerCase();
    if (s.includes("погрузк") || s.includes("загрузк")) return "loading";
    if (s.includes("пути"))                              return "transit";
    if (s.includes("выгруз"))                            return "unloading";
    if (s.includes("выполн") || s.includes("завершён"))  return "done";
    return "planned"; // "В плане" и всё остальное
  }

  function stateBadge(r) {
    const sk = stateKey(r.current_state);
    if (sk === "loading") {
      const delayed = String(r.loading_status || "").includes("Задерж");
      return delayed
        ? { label: "Задерживается", cls: "delayed" }
        : { label: "На погрузке",   cls: "loading"  };
    }
    return {
      transit:   { label: "В пути",        cls: "transit"   },
      unloading: { label: "Под выгрузкой", cls: "unloading" },
      done:      { label: "Выполнен",      cls: "done"      },
      planned:   { label: "В плане",       cls: "planned"   },
    }[sk] || { label: r.current_state || "—", cls: "planned" };
  }

  // ─── Дата-ячейка (план / факт) ─────────────────────────────────────────────

  function parseDate(str) {
    // Формат dd.MM.yyyy или dd.MM.yyyy HH:mm
    const m = String(str || "").match(/^(\d{2})\.(\d{2})\.(\d{4})/);
    if (!m) return null;
    return new Date(+m[3], +m[2] - 1, +m[1]);
  }

  function dateCellHtml(plan, fact, eta) {
    if (!plan && !fact && !eta) return '<div class="date-cell"><span class="date-dash">—</span></div>';
    let html = '<div class="date-cell">';
    if (plan) html += `<div class="date-plan">${esc(plan)}</div>`;
    if (fact) {
      const late = (() => { const p = parseDate(plan), f = parseDate(fact); return p && f && f > p; })();
      html += `<div class="date-fact ${late ? "late" : "ok"}">${esc(fact)}</div>`;
    } else if (eta) {
      html += `<div class="date-eta">прогноз: ${esc(eta)}</div>`;
    }
    html += '</div>';
    return html;
  }

  // ─── Ячейка колонки «Прибытие / Статус погрузки» (зависит от состояния) ──

  function middleCellHtml(r) {
    const sk = stateKey(r.current_state);

    if (sk === "loading") {
      // Показываем статус погрузки и кол-во вагонов
      const delayed = String(r.loading_status || "").includes("Задерж");
      const statusLabel = delayed ? "Задерживается отправка" : "В плане";
      const statusCls   = delayed ? "delayed" : "ok";
      const wagTotal  = Number(r.wagons_total)  || 0;
      const wagLoaded = Number(r.wagons_loaded) || 0;
      const wagSub = wagLoaded && wagTotal && wagLoaded < wagTotal
        ? `Погружено: ${wagLoaded} из ${wagTotal} ваг.`
        : wagTotal ? `Вагонов: ${wagTotal}` : "";
      return `<div class="loading-cell">
        <div class="date-plan">Отправление: ${esc(r.departure_plan || "—")}</div>
        <div class="loading-status ${statusCls}">${esc(statusLabel)}</div>
        ${wagSub ? `<div class="wagons-sub">${esc(wagSub)}</div>` : ""}
      </div>`;
    }

    if (sk === "transit") {
      // Показываем текущую станцию + км + ETA
      if (!r.current_station && !r.km_remaining && !r.eta) {
        return dateCellHtml(r.arrival_plan, r.actual_arrival, r.eta);
      }
      return `<div class="transit-cell">
        ${r.current_station ? `<div class="transit-station">${esc(r.current_station)}</div>` : ""}
        ${r.km_remaining ? `<div class="transit-km">до станции: ${esc(r.km_remaining)} км</div>` : ""}
        ${r.eta ? `<div class="transit-eta">прогноз: ${esc(r.eta)}</div>` : ""}
      </div>`;
    }

    if (sk === "unloading") {
      // Показываем дату прибытия (факт) и плановую дату отправления
      return `<div class="date-cell">
        ${r.actual_arrival ? `<div class="date-fact ok">прибыло: ${esc(r.actual_arrival)}</div>` : ""}
        ${r.arrival_plan   ? `<div class="date-plan">план: ${esc(r.arrival_plan)}</div>`          : ""}
      </div>`;
    }

    // done / planned — стандартная ячейка прибытия
    return dateCellHtml(r.arrival_plan, r.actual_arrival, r.eta);
  }

  // ─── Развёрнутая строка ────────────────────────────────────────────────────

  function expandedHtml(r) {
    const sk = stateKey(r.current_state);
    let html = "";

    if (sk === "transit" && r.current_station) {
      html += `<div class="location-line">
        <span class="location-dot"></span>
        Сейчас: ${esc(r.current_station)}
        ${r.km_remaining ? ` &nbsp;·&nbsp; до станции: ${esc(r.km_remaining)} км` : ""}
      </div>`;
    }

    html += '<div class="expanded-grid">';

    if (sk === "loading") {
      const delayed = String(r.loading_status || "").includes("Задерж");
      html += kv("Статус погрузки", r.loading_status || "—", delayed ? "warn" : "ok");
      if (r.wagons_loaded && r.wagons_total) {
        html += kv("Погружено вагонов", `${r.wagons_loaded} из ${r.wagons_total}`);
      }
      html += kv("Плановое отправление", r.departure_plan || "—");
      html += kv("Плановое прибытие",    r.arrival_plan   || "—");
    }

    if (sk === "transit") {
      html += kv("Отправление (план)", r.departure_plan   || "—");
      html += kv("Отправление (факт)", r.actual_departure || "—");
      html += kv("Прибытие (план)",    r.arrival_plan     || "—");
      if (r.eta) html += kv("Прогноз прибытия", r.eta, "ok");
      if (r.dislocation_updated_at) html += kv("Дислокация обновлена", r.dislocation_updated_at);
    }

    if (sk === "unloading") {
      html += kv("Прибыло", r.actual_arrival || "—");
      html += kv("Плановая дата прибытия", r.arrival_plan || "—");
      html += kv("Отправление (факт)",     r.actual_departure || "—");
      if (r.dislocation_updated_at) html += kv("Дислокация обновлена", r.dislocation_updated_at);
    }

    if (sk === "done") {
      html += kv("Отправление (план)", r.departure_plan   || "—");
      html += kv("Отправление (факт)", r.actual_departure || "—");
      html += kv("Прибытие (план)",    r.arrival_plan     || "—");
      html += kv("Прибытие (факт)",    r.actual_arrival   || "—");
    }

    if (sk === "planned") {
      html += kv("Плановое отправление", r.departure_plan || "—");
      html += kv("Плановое прибытие",    r.arrival_plan   || "—");
      html += kv("Вагонов",              r.wagons_total   || "—");
    }

    if (r.alert_text) {
      html += kv("Примечание", r.alert_text, "warn");
    }

    html += '</div>';
    return html;
  }

  function kv(label, value, cls) {
    const vcls = cls ? ` class="expanded-v ${cls}"` : ' class="expanded-v"';
    return `<div class="expanded-kv">
      <div class="expanded-k">${esc(label)}</div>
      <div${vcls}>${esc(value)}</div>
    </div>`;
  }

  // ─── Алерты ────────────────────────────────────────────────────────────────

  function renderAlerts(rows) {
    alertList.innerHTML = "";
    rows
      .filter(r => { const o = String(r.overall_status || "").toUpperCase(); return o === "BAD" || o === "WARN"; })
      .slice(0, 5)
      .forEach(r => {
        const isBad = String(r.overall_status || "").toUpperCase() === "BAD";
        const cls   = isBad ? "red" : "yellow";
        const routeLabel = esc(r.route_name || r.trip_id || "");
        const title = isBad
          ? `Задержка рейса: ${routeLabel}`
          : `Внимание: ${routeLabel}`;
        const desc = esc(r.alert_text || r.loading_status || "");
        const div  = document.createElement("div");
        div.className = `alert ${cls}`;
        div.innerHTML = `
          <div class="alert-icon">⚠</div>
          <div class="alert-body">
            <div class="alert-title">${title}</div>
            ${desc ? `<div class="alert-desc">${desc}</div>` : ""}
          </div>
          <button class="alert-close" title="Закрыть">×</button>`;
        div.querySelector(".alert-close").addEventListener("click", () => div.remove());
        alertList.appendChild(div);
      });
  }

  // ─── Таблица ───────────────────────────────────────────────────────────────

  function renderTable() {
    const filtered = currentFilter === "all"
      ? allRows
      : allRows.filter(r => stateKey(r.current_state) === currentFilter);

    totalCount.textContent = allRows.length;
    tableBody.innerHTML = "";

    if (!filtered.length) {
      tableBody.innerHTML = '<div class="empty-state">Рейсы не найдены</div>';
      return;
    }

    for (const r of filtered) {
      const badge  = stateBadge(r);
      const isDone = stateKey(r.current_state) === "done";

      const row = document.createElement("div");
      row.className = "train-row";
      row.innerHTML = `
        <div class="row-main">
          <button class="expand-btn" title="Подробнее">›</button>
          <div>
            <div class="route-name">${esc(r.route_name || "—")}</div>
            <div class="route-num">${esc(r.trip_id || "")}${r.wagons_total ? " / " + esc(r.wagons_total) + " ваг." : ""}</div>
          </div>
          ${dateCellHtml(r.departure_plan, r.actual_departure, "")}
          ${middleCellHtml(r)}
          <div><span class="badge ${badge.cls}">${esc(badge.label)}</span></div>
          <div class="actions-cell">
            <button class="action-btn">📄 Отчёт</button>
            ${isDone ? '<button class="action-btn">🗂 Архив</button>' : '<button class="action-btn">📅 Перенос</button>'}
          </div>
        </div>
        <div class="row-expanded" style="display:none">
          ${expandedHtml(r)}
        </div>`;

      const mainRow    = row.querySelector(".row-main");
      const expandedEl = row.querySelector(".row-expanded");
      const expandBtn  = row.querySelector(".expand-btn");
      mainRow.addEventListener("click", e => {
        if (e.target.closest(".action-btn")) return;
        const open = expandedEl.style.display === "none";
        expandedEl.style.display = open ? "block" : "none";
        expandBtn.classList.toggle("open", open);
      });

      tableBody.appendChild(row);
    }
  }

  // ─── Загрузка CSV ──────────────────────────────────────────────────────────

  function setError(msg) {
    errBanner.style.display = msg ? "block" : "none";
    errBanner.textContent = msg || "";
  }

  async function load() {
    try {
      const bust = (CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
      const res  = await fetch(CSV_URL + bust, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status + " " + res.statusText);
      const text  = await res.text();
      const table = csvParse(text);

      if (table.length < 2) {
        setError(table.length === 1
          ? "Заголовки найдены, строк данных нет. Колонки: " + table[0].join(", ")
          : "CSV пустой или ссылка ведёт не на тот лист.");
        return;
      }

      setError("");
      const m = idxMap(table[0].map(h => String(h || "").trim()));
      const g = key => m[key] !== undefined ? arr => arr[m[key]] || "" : () => "";

      allRows = table.slice(1).map(arr => ({
        trip_id             : g("trip_id")(arr),
        route_name          : g("route_name")(arr),
        current_state       : g("current_state")(arr),
        loading_status      : g("loading_status")(arr),
        wagons_total        : g("wagons_total")(arr),
        wagons_loaded       : g("wagons_loaded")(arr),
        departure_plan      : g("departure_plan")(arr),
        arrival_plan        : g("arrival_plan")(arr),
        actual_departure    : g("actual_departure")(arr),
        actual_arrival      : g("actual_arrival")(arr),
        current_station     : g("current_station")(arr),
        km_remaining        : g("km_remaining")(arr),
        eta                 : g("eta")(arr),
        dislocation_updated_at: g("dislocation_updated_at")(arr),
        alert_text          : g("alert_text")(arr),
        overall_status      : g("overall_status")(arr),
      })).filter(r => r.trip_id || r.route_name);

      // Сортировка: активные первыми
      const stateOrder = { loading: 0, transit: 1, unloading: 2, planned: 3, done: 4 };
      allRows.sort((a, b) => {
        const oa = stateOrder[stateKey(a.current_state)] ?? 5;
        const ob = stateOrder[stateKey(b.current_state)] ?? 5;
        return oa !== ob ? oa - ob : String(a.departure_plan).localeCompare(String(b.departure_plan), "ru");
      });

      lastUpdate.textContent = new Date().toLocaleString("ru-RU", {
        day: "2-digit", month: "2-digit", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
      const months = ["Январь","Февраль","Март","Апрель","Май","Июнь",
                      "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
      const now = new Date();
      panelTitle.textContent = `График движения: ${months[now.getMonth()]} ${now.getFullYear()}`;

      renderAlerts(allRows);
      renderTable();
    } catch (e) {
      setError(String(e?.message || e));
    }
  }

  load();
  setInterval(load, REFRESH_EVERY_SEC * 1000);
</script>
</body>
</html>
